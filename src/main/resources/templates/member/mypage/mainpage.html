<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div id="message"></div>
<div id="ranking">
    <button onclick="loadRanking('asset')">총 자산순</button>
    <button onclick="loadRanking('score')">점수순</button>
    <div id="rankingList">
    </div>
</div>
<div>
    <input type="button" value="주식게임" onclick="location.href = '/game/detail-stock'">
</div>
</body>
<script>
    // 페이지 로드 시 기본으로 자산순 랭킹 보여주기
    window.onload = function () {
        const token = localStorage.getItem('jwt-token');
        if (!token) {
            document.getElementById('message').innerText = '로컬 스토리지에 토큰이 없습니다. 먼저 로그인을 해주세요.';
            return;
        }
        // 기본: 자산순 로딩
        loadRanking('asset');
    }

    async function loadRanking(type) {
        const token = localStorage.getItem('jwt-token');
        const list = document.getElementById('rankingList');
        const message = document.getElementById('message');

        if (!token) {
            message.innerText = '로그인이 필요합니다.';
            return;
        }
        try {
            const res1 = await fetch(`/api/main/rank?type=${type}`, {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            if(!res1.ok) throw new Error('게임 기록을 불러오지 못했습니다');

            const rankings = await res1.json();
            list.innerHTML = '';

            if(rankings.length === 0 ) {
                list.innerHTML = '<div>참여한 게임이 없습니다.</div>';
                message.innerText = '랭킹 데이터가 없습니다.';
                return;
            }

        rankings.forEach((user, i) => {
            const div = document.createElement('div');
            div.innerText = `${i + 1}위 - ${user.username} | 자산: ${user.asset} | 점수: ${user.score}`;
            list.appendChild(div);
        });

        message.innerText = type === 'asset' ? '총 자산순 랭킹입니다.' : '점수순 랭킹입니다.';

        }catch(err) {
            message.innerText = '에러 발생: ' + err.message;
        }
    }
</script>
</html>
