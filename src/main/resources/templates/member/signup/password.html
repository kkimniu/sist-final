<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 비밀번호 입력</title>
</head>
<body>

<div class="container">

    <div class="logo-area">
        <a href="/">
            <img src="/images/logo.png" alt="서비스 로고">
        </a>
    </div>

    <div class="signup-title">
        <h2>비밀번호 입력</h2>
    </div>
    <div class="signup-content">
        <p>사용하실 비밀번호를 입력해주세요. 최소 8자, 최대 64자 까지 가능합니다.</p>
    </div>

    <form th:action="@{/signup/password}" th:object="${signupForm}" method="post">
        <div>
            <input type="password" id="password" name="password" required/>

            <div th:if="${#fields.hasErrors('password')}" style="color:red;">
                <p th:text="${#fields.errors('password')[0]}"></p>
            </div>
        </div>

        <div>
            <input type="password" id="passwordConfirm" name="passwordConfirm" required/>

            <div th:if="${#fields.hasErrors('passwordConfirm')}" style="color:red;">
                <p th:text="${#fields.errors('passwordConfirm')[0]}"></p>
            </div>
        </div>

        <div th:if="${#fields.hasGlobalErrors()}" style="color:red;">
            <p th:text="${#fields.globalErrors()[0]}"></p>
        </div>

        <div class="submit-area">
            <button type="submit">가입하기</button>
        </div>
        <div>
            <a th:href="@{/signup/nickname}">돌아가기</a>
        </div>

    </form>

</div>

</body>
</html>
