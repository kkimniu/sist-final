<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 이메일 인증</title>
</head>
<body>

<div class="container">

    <div class="logo-area">
        <a href="/">
            <img src="/images/logo.png" alt="서비스 로고">
        </a>
    </div>

    <div class="signup-title">
        <h2>이메일 인증</h2>
    </div>
    <div class="signup-content">
        <p><b><span th:text="${signupForm.email}"></span></b>로 받으신 인증번호를 입력해주세요.
            인증번호는 1시간 동안만 유효합니다.</p>
    </div>

    <form th:action="@{/signup/verify}" th:object="${signupForm}" method="post">

        <input type="text" id="authKey" name="authKey" minlength="6" maxlength="6" pattern="^\d{6}$"
               inputmode="numeric" placeholder="000000" title="정확히 6자리 숫자를 입력해주세요 (예: 000000)" required/>

        <div th:if="${#fields.hasErrors('authKey')}" style="color:red;">
            <p th:text="${#fields.errors('authKey')[0]}"></p>
        </div>

        <div class="submit-area">
            <button type="submit">계속</button>
        </div>
        <div>
            <a th:href="@{/signup/email}">돌아가기</a>
        </div>

    </form>

</div>

</body>
</html>
