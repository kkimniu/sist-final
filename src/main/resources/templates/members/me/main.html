<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div>
    <h1>마이 페이지</h1>
    <div>
        <!-- 게임기록-->
        <h2>게임기록</h2>
        <ul id="game-list"></ul>
    </div>
    <div>
        <!--닉네임 등급 자산조회 등등-->
        <strong>닉네임</strong> <span id="nickname"></span>
        <strong>등급</strong> <span id="total-score"></span><br>
        <input type="button" value="닉네임변경" onclick="location.href= window.location.pathname + '/nickname'"/>
        <input type="button" value="비밀번호변경" onclick="location.href= window.location.pathname + '/password'"/><br>
        <h3>자산조회</h3> <span id="cash"></span><br>
        <input type="button" value="자산초기화" onclick="cashReset()"><br>
    </div>
</div>

<div>
    <a href="#" id="logout-link" class="nav-button logout-button">로그아웃</a>
</div>

<div>
    <input type="button" value="회원탈퇴" onclick="location.href = window.location.pathname + '/withdraw'"><br>
</div>
<script src="/js/header.js"></script>
<script>
    window.onload = async function () {
        const token = localStorage.getItem('jwt-token');
        if (!token) {
            document.getElementById('message').innerText = '로컬 스토리지에 토큰이 없습니다. 먼저 로그인을 해주세요.';
            return;
        }
        try {
            const res1 = await fetch(`/api/members/me`,{
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            if(!res1.ok) throw new Error('회원 정보를 불러오지 못했습니다');
            setupLogout();
            const member = await res1.json();
            document.getElementById('nickname').innerText = member.nickname;
            document.getElementById('cash').innerText = member.cash;
            document.getElementById('total-score').innerText = member.totalScore;

            const res2 = await fetch(`/api/members/me/game-participations`, {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            if(!res2.ok) throw new Error('게임 기록을 불러오지 못했습니다');
            const gameParticipation = await res2.json();
            const list = document.getElementById('game-list');
            if(gameParticipation.length === 0 ) {
                list.innerHTML = '<li>참여한 게임이 없습니다.</li>'
            }else{
                gameParticipation.forEach(game => {
                    const li = document.createElement('li');
                    const date = new Date(game.enteredAt);
                    const formatted = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                    li.innerText = `날짜: ${formatted}
                   | 수익률: ${game.returnId}%
                   | 순위: ${game.gameRank}위
                   | 점수: ${game.earnedScore} → ${game.postScore}
                   | 캐시: ${game.earnedCash} → ${game.postCash}`;
                    list.appendChild(li);
                });
            }
        }catch(err) {

        }
    }
</script>
<script>
    async function cashReset() {
        const token = localStorage.getItem('jwt-token');
        if (!token) {
            document.getElementById('message').innerText = '로컬 스토리지에 토큰이 없습니다. 먼저 로그인을 해주세요.';
            return;
        }
        try {
            const res = await fetch(`/api/members/me/cash/reset`,{
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                }
            });
            if(!res.ok){
                throw new Error('자산 초기화 실패');
            }
            alert('자산 초기화 성공');
            location.href = '/members/me';
        }catch (error){
            alert(error.message);
        }
    }
        // 로그아웃 기능 설정 함수
    function setupLogout() {
        const logoutLink = document.getElementById('logout-link');
        if (logoutLink) {
            logoutLink.addEventListener('click', function(event) {
                event.preventDefault();
                localStorage.removeItem('jwt-token');
                alert('로그아웃 되었습니다.');
                window.location.href = '/';
            });
        }
    }
</script>
</body>
</html>
