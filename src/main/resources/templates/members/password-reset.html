<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
</head>
<body>

<h1>비밀번호 재설정</h1>

<div id="step1-email">
    <h2>이메일 주소 입력</h2>
    <form id="form-step1">
        <label for="email-input">이메일:</label>
        <input type="email" id="email-input" placeholder="가입한 이메일을 입력하세요" required>
        <button type="submit" id="send-email-btn">인증메일 발송</button>
    </form>
    <div id="step1-message" style="color: red;"></div>
</div>

<div id="step2-verification" style="display: none;">
    <h2>인증 코드 확인</h2>
    <p><strong><span id="display-email"></span></strong>으로 인증 코드를 발송했습니다.</p>
    <form id="form-step2">
        <label for="auth-key-input">인증 코드:</label>
        <input type="text" id="auth-key-input" placeholder="이메일로 받은 인증 코드" required>
        <button type="submit" id="verify-code-btn">인증 확인</button>
    </form>
    <div id="step2-message" style="color: red;"></div>
</div>

<div id="step3-password" style="display: none;">
    <h2>새 비밀번호 설정</h2>
    <form id="form-step3">
        <div>
            <input type="password" id="new-password-input" required>
        </div>
        <div>
            <input type="password" id="confirm-password-input" required>
        </div>
        <button type="submit" id="reset-password-btn">비밀번호 변경</button>
    </form>
    <div id="step3-message" style="color: red;"></div>
</div>

<script src="/js/member/password-reset.js"></script>
</body>
</html>
