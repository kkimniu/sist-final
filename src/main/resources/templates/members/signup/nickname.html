<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 닉네임 입력</title>
</head>
<body>

<div class="container">

    <div class="logo-area">
        <a href="/">
            <img src="/images/logo.png" alt="서비스 로고">
        </a>
    </div>

    <div class="signup-title">
        <h2>닉네임 입력</h2>
    </div>
    <div class="signup-content">
        <p>사용하실 닉네임을 입력해주세요.</p>
    </div>

    <form th:action="@{/signup/nickname}" th:object="${signupDto}" method="post">

        <input type="text" id="nickname" name="nickname"
               minlength="1" maxlength="16" pattern="^[가-힣a-zA-Z0-9]{1,16}$"
               th:field="*{nickname}" placeholder="닉네임" required>

        <div th:if="${#fields.hasErrors('nickname')}" style="color:red;">
            <p th:text="${#fields.errors('nickname')[0]}"></p>
        </div>

        <div class="submit-area">
            <button type="submit">계속</button>
        </div>


    </form>

</div>

</body>
</html>
