<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>게임 메인 화면</title>
</head>
<style>
    #graphContainer {
        overflow-x: auto;
    }

    #priceChartContainer {
        position: relative;
    }

    #tradeVolumeChartContainer {
        position: relative;
        margin-top: 30px;
    }

    #priceChartWriter {
        position: absolute;
        left: 0;
        top: 0;
    }

    #priceChartLayout {
        position: absolute;
        left: 0;
        top: 0;
    }

    #tradeVolumeChartWriter {
        position: absolute;
        left: 0;
        top: 0;
    }

    #tradeVolumeChartLayout {
        position: absolute;
        left: 0;
        top: 0;
    }


    #orderContainer {
        display: flex;
    }

    #orderBookLayout {
        width: 40%;
        height: 100%;
        float: left;
    }

    #orderPanelLayout {
        width: 50%;
        height: 50%;
        border-left: 1px solid black;
        border-right: 1px solid black;
        float: right;
    }

    #chatLayout {
        clear: right;
        display: flex;
        align-items: center;
        align-content: center;
        flex-direction: column;
        flex-wrap: nowrap;
        justify-content: center;
        width: 50%;
        height: 50%;
        border-left: 1px solid black;
        border-right: 1px solid black;
        border-bottom: 1px solid black;
    }

    #orderBook {
        width: 100%;
        height: 100%;

        td {
            text-align: center;
            vertical-align: middle;
        }
    }

    #tabLayout {
        display: flex;
        align-items: center;
        align-content: center;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: center;
        width: 100%;
        height: 20%;
        border-bottom: 1px solid black;
        border-top: 1px solid black;
    }

    #PanelLayout {
        display: flex;
        align-items: center;
        align-content: center;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: center;
        width: 100%;
        height: 80%;
        border-bottom: 1px solid black;
        border-top: 1px solid black;
    }

    #sellPanel {
        display: block;
        width: 100%;
        height: 100%;
        border-right: 1px solid black;
    }

    #buyPanel {
        display: none;
        width: 100%;
        height: 100%;
        border-right: 1px solid black;
    }

    #promisePanel {
        display: none;
        width: 100%;
        height: 100%;
        border-right: 1px solid black;
    }

    #chatLog {
        height: 100px;
        overflow-y: scroll;
        width: 300px;
    }

</style>
<body>
<div id=gameInfoLayout>
    <label id=nickname></label><br>
    <label>보유 현금: </label><label id=cash></label><br>
    <label>주가: </label><label id=stockPrice></label><br>
    <label>보유 주식: </label><label id="stocksHolding"></label><br>
    <label>게임참여 인원: </label><label id="numberOfParticipation"></label><br>
    <label>남은 세션 시간: </label><label id=timeLeft></label>
</div>

<div id="graphContainer">
    <div id="priceChartContainer">
        <canvas id="priceChartLayout"></canvas>
        <canvas id="priceChartWriter"></canvas>
    </div>
    <div id="tradeVolumeChartContainer">
        <canvas id="tradeVolumeChartLayout"></canvas>
        <canvas id="tradeVolumeChartWriter"></canvas>
    </div>
</div>

<div id="orderContainer">
    <div id="orderBookLayout">
        <table id="orderBook">
            <tr>
                <td id="buy10"></td>
                <td id="buyPrice10"></td>

            </tr>

                <td id="buy6"></td>

                <td></td>
            </tr>
            <tr>
                <td id="buy5"></td>
                <td id="buyPrice5"></td>
                <td></td>
            </tr>
            <tr>
                <td id="buy4"></td>
                <td id="buyPrice4"></td>
                <td></td>
            </tr>
            <tr>
                <td id="buy3"></td>
                <td id="buyPrice3"></td>
                <td></td>
            </tr>
            <tr>
                <td id="buy2"></td>
                <td id="buyPrice2"></td>
                <td></td>
            </tr>
            <tr>
                <td id="buy1"></td>
                <td id="buyPrice1"></td>
                <td id="buyAll"></td>
            </tr>
            <tr>
                <td id="sellAll"></td>
                <td id="sell1"></td>
                <td id="sellPrice1"></td>
            </tr>
            <tr>
                <td></td>
                <td id="sell2"></td>
                <td id="sellPrice2"></td>
            </tr>
            <tr>
                <td></td>
                <td id="sell3"></td>
                <td id="sellPrice3"></td>
            </tr>
            <tr>
                <td></td>
                <td id="sell4"></td>
                <td id="sellPrice4"></td>
            </tr>
            <tr>
                <td></td>
                <td id="sell5"></td>
                <td id="sellPrice5"></td>
            </tr>
            <tr>
                <td></td>

            <tr>

            </tr>
            <tr>

            </tr>
            <tr>
                <td></td>

                <td id="sellPrice9"></td>
            </tr>
            <tr>
                <td></td>
                <td id="sell10"></td>
                <td id="sellPrice10"></td>
            </tr>
        </table>
    </div>

    <div id="orderPanelLayout">
        <div id="tabLayout">
            <div id="sellTab" onclick="showSellPanel();">매도</div>
            <div id="buyTab" onclick="showBuyPanel();">매수</div>
            <div id="promiseTab" onclick="showPromisePanel();">미체결</div>
            <div id="tradeLogTab" onclick="showTradeLogPanel();">거래내역</div>
        </div>
        <div id="PanelLayout">
            <div id="sellPanel">
                <input type="text" id="sellOrderPrice" placeholder="매도 가격"/>
                <input type="text" id="sellOrderQuantity" placeholder="매도 수량"/>
                <input type="button" id="sellOrderButton" value="매도" onclick="requestSellOrder();"/>
            </div>
            <div id="buyPanel">
                <input type="text" id="buyOrderPrice" placeholder="매수 가격"/>
                <input type="text" id="buyOrderQuantity" placeholder="매수 수량"/>
                <input type="button" id="buyOrderButton" value="매수" onclick="requestBuyOrder();"/>
            </div>
            <div id="promisePanel">
                <table id="promiseTable">
                    <tr>
                        <th>주문번호</th>
                        <th>가격</th>
                        <th>수량</th>
                        <th>요청시간</th>
                    </tr>
                </table>
            </div>
            <div id="tradeLogPanel">
                <table id="tradeLogTable">
                    <tr>
                        <th>주문번호</th>
                        <th>가격</th>
                        <th>수량</th>
                        <th>거래시간</th>
                    </tr>
                </table>
            </div>
        </div>
    </div>

    <div id="chatLayout">
        <div id="chatLog">

        </div>
        <label for="chatInput"></label><input type="text" id="chatInput" placeholder="메세지 입력"/>
        <input type="submit" id="chatSend" value="보내기"/>
    </div>
</div>
<script src="/js/game/chatComp.js"></script>
<script src="/js/game/ajax.js"></script>
<script src="/js/game/orderBookComp.js"></script>
<script src="/js/game/chartComp.js"></script>
<script src="/js/game/orderPanelComp.js"></script>
</body>
</html>
